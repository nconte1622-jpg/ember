workflows:
  ember-ios:
    name: Ember -> TestFlight
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      xcode: 16.4
      node: 22.14.0
      vars:
        EXPO_TOKEN: VdLP51POLFCIN8Aw8c-zF4NFtlySNecaSECmueKQ
        EXPO_APPLE_APP_SPECIFIC_PASSWORD: dsyz-moyc-pstl-npba
        APPLE_ID: nconte1622@gmail.com
        APPLE_TEAM_ID: P7N677SK5K
    scripts:
      - name: Install EAS CLI
        script: npm install -g eas-cli@latest
      - name: Install dependencies
        script: npm install
      - name: EAS local build (iOS)
        script: |
          eas build --platform ios --profile production --local --non-interactive --output /tmp/ember.ipa
    artifacts:
      - /tmp/ember.ipa
      - /tmp/*.ipa
      - build/**/*.ipa
    publishing:
      email:
        recipients:
          - nconte1622@gmail.com

  ember-submit:
    name: Ember Submit to TestFlight
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      node: 22.14.0
      vars:
        EXPO_TOKEN: VdLP51POLFCIN8Aw8c-zF4NFtlySNecaSECmueKQ
        EXPO_APPLE_APP_SPECIFIC_PASSWORD: dsyz-moyc-pstl-npba
        APPLE_ID: nconte1622@gmail.com
        IPA_URL: https://api.codemagic.io/artifacts/04c22421-b7ab-4c99-a869-118659ae4dd9/512dc8a7-44ed-4b16-8bdd-5cab7c8252ed/ember.ipa
    scripts:
      - name: Install EAS CLI
        script: npm install -g eas-cli@latest
      - name: Install dependencies
        script: npm install
      - name: Download IPA
        script: |
          curl -L -o /tmp/ember.ipa "$IPA_URL" -H "x-auth-token: $CM_API_TOKEN"
          ls -la /tmp/ember.ipa
      - name: Submit to TestFlight via altool
        script: |
          xcrun altool --upload-app \
            -f /tmp/ember.ipa \
            -t ios \
            -u "nconte1622@gmail.com" \
            -p "dsyz-moyc-pstl-npba" \
            --verbose 2>&1 || true
          echo "--- altool exit: $?"
    publishing:
      email:
        recipients:
          - nconte1622@gmail.com
