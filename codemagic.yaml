workflows:
  ember-ios:
    name: Ember -> TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      xcode: 26
      node: 22.14.0
      vars:
        EXPO_TOKEN: VdLP51POLFCIN8Aw8c-zF4NFtlySNecaSECmueKQ
        EXPO_APPLE_APP_SPECIFIC_PASSWORD: twai-kboj-acio-xtza
        APPLE_ID: nconte22@icloud.com
        APPLE_TEAM_ID: P7N677SK5K
    scripts:
      - name: Install EAS CLI
        script: npm install -g eas-cli@latest
      - name: Install dependencies
        script: npm install
      - name: EAS local build (iOS)
        script: |
          eas build --platform ios --profile production --local --non-interactive --output /tmp/ember.ipa
      - name: Submit to TestFlight
        script: |
          eas submit --platform ios --profile production --path /tmp/ember.ipa --non-interactive
    artifacts:
      - /tmp/ember.ipa
      - /tmp/*.ipa
      - build/**/*.ipa
    publishing:
      email:
        recipients:
          - nconte1622@gmail.com
